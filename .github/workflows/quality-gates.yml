# Quality-gate workflow.
#
# Gates beyond the unit-test suite: dead-code detection on every pull request,
# and full mutation testing on a weekly schedule (or on demand). Mutation runs
# are too slow for the PR loop; the schedule keeps the suite honest without
# blocking day-to-day work.

name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: 0 3 * * 1
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deadcode:
    name: Dead code (knip)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run knip
        run: npm run deadcode

  size:
    name: Bundle size (size-limit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run size

  mutation:
    name: Mutation tests (stryker)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: build/mutation/
          retention-days: 30
