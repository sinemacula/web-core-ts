# ==============================================================================
# QUALITY GATES
# ==============================================================================
name: Quality Gates

# ==============================================================================
# TRIGGERS
# ==============================================================================
on:
    push:
        branches: [ master ]
    pull_request:
        types: [ opened, synchronize, reopened, ready_for_review ]
    schedule:
        -   cron: 0 3 * * 1
    workflow_dispatch:

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
    group: quality-gates-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
    contents: read

# ==============================================================================
# DEFAULTS
# ==============================================================================
defaults:
    run:
        shell: bash

jobs:

    # ==========================================================================
    # JOB: DEAD CODE
    # ==========================================================================
    deadcode:
        name: Dead code (knip)
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    persist-credentials: false

            -   name: Setup Node.js
                uses: actions/setup-node@v7
                with:
                    node-version: '24'
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Knip
                run: npm run deadcode

    # ==========================================================================
    # JOB: STRUCTURE
    # ==========================================================================
    structure:
        name: Structure lint
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    persist-credentials: false

            -   name: Setup Node.js
                uses: actions/setup-node@v7
                with:
                    node-version: '24'
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Preset unit tests
                run: npm run test:eslint

            -   name: Structure lint
                run: npm run lint:structure

    # ==========================================================================
    # JOB: BUNDLE SIZE
    # ==========================================================================
    size:
        name: Bundle size (size-limit)
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    persist-credentials: false

            -   name: Setup Node.js
                uses: actions/setup-node@v7
                with:
                    node-version: '24'
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Build
                run: npm run build

            -   name: Check bundle size
                run: npm run size

    # ==========================================================================
    # JOB: MUTATION
    # ==========================================================================
    mutation:
        name: Mutation tests (stryker)
        runs-on: ubuntu-latest
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    persist-credentials: false

            -   name: Setup Node.js
                uses: actions/setup-node@v7
                with:
                    node-version: '24'
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Mutation tests
                run: npm run test:mutation

            -   name: Upload mutation report
                if: always()
                uses: actions/upload-artifact@v7
                with:
                    name: mutation-report
                    path: build/mutation/
                    retention-days: 30
