# ==============================================================================
# QUALITY GATES
# ==============================================================================
name: Quality Gates

# ==============================================================================
# TRIGGERS
# ==============================================================================
on:
    push:
        branches: [ master ]
    pull_request:
        types: [ opened, synchronize, reopened, ready_for_review ]
    schedule:
        -   cron: 0 3 * * 1
    workflow_dispatch:

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
    group: quality-gates-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
    contents: read

# ==============================================================================
# DEFAULTS
# ==============================================================================
defaults:
    run:
        shell: bash

jobs:

    # ==========================================================================
    # JOB: GATES
    # ==========================================================================
    # Knip, bundle size, and mutation (scoped on PRs, full on schedule) - all
    # from the shared reusable workflow.
    gates:
        uses: sinemacula/.github/.github/workflows/node-quality-gates.yml@v1.6.1

    # ==========================================================================
    # JOB: STRUCTURE
    # ==========================================================================
    # Repo-specific: dogfood the web-core eslint preset. Consumers get the preset
    # through qlty, so this job does not belong in the shared workflow.
    structure:
        name: Structure lint
        if: ${{ github.event_name != 'schedule' }}
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    persist-credentials: false

            -   name: Setup Node.js
                uses: actions/setup-node@v7
                with:
                    node-version: '24'
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Preset unit tests
                run: npm run test:eslint

            -   name: Structure lint
                run: npm run lint:structure
