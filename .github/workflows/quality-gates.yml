# ==============================================================================
# QUALITY GATES
# ==============================================================================
name: Quality Gates

# ==============================================================================
# TRIGGERS
# ==============================================================================
on:
    push:
        branches: [ master ]
    pull_request:
        types: [ opened, synchronize, reopened, ready_for_review ]
    schedule:
        -   cron: 0 3 * * 1
    workflow_dispatch:

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
    group: quality-gates-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
    contents: read

# ==============================================================================
# DEFAULTS
# ==============================================================================
defaults:
    run:
        shell: bash

jobs:

    # ==========================================================================
    # JOB: GATES
    # ==========================================================================
    # Knip, bundle size, and mutation (scoped on PRs, full on schedule) - all
    # from the shared reusable workflow.
    gates:
        uses: sinemacula/.github/.github/workflows/node-quality-gates.yml@v1.6.1

    # ==========================================================================
    # JOB: STRUCTURE
    # ==========================================================================
    # Repo-specific: dogfood the web-core eslint preset. Consumers get the
    # preset through qlty, so this job does not belong in the shared workflow.
    structure:
        name: Structure lint
        if: ${{ github.event_name != 'schedule' }}
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    persist-credentials: false

            # The preset rule tests and mutation gate only need to run when the
            # preset itself, or a dependency that could change rule behaviour,
            # changes. The structure lint validates all source and runs always.
            -   name: Detect preset changes
                id: changes
                uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
                with:
                    filters: |
                        preset:
                            - 'eslint/**'
                            - 'eslint.structure.mjs'
                            - 'stryker.eslint.config.json'
                            - 'package.json'
                            - 'package-lock.json'

            -   name: Setup Node.js
                uses: actions/setup-node@v7
                with:
                    node-version: '24'
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Preset unit tests
                if: ${{ steps.changes.outputs.preset == 'true' || github.event_name == 'workflow_dispatch' }}
                run: npm run test:eslint

            -   name: Preset mutation gate
                if: ${{ steps.changes.outputs.preset == 'true' || github.event_name == 'workflow_dispatch' }}
                run: npm run test:mutation:eslint

            -   name: Structure lint
                run: npm run lint:structure
