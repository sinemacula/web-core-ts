# ==============================================================================
# RELEASE
# ==============================================================================
name: Release

# ==============================================================================
# TRIGGER
# ==============================================================================
on:
    push:
        branches: [ master ]

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
    contents: write
    pull-requests: write

jobs:

    # ==========================================================================
    # JOB: RELEASE
    # ==========================================================================
    release:
        uses: sinemacula/.github/.github/workflows/release.yml@v1.5.0
        secrets: inherit
        with:
            release-type: node
            use-app-token: true
