# ==============================================================================
# TESTS
# ==============================================================================
name: Tests

# ==============================================================================
# TRIGGERS
# ==============================================================================
on:
    push:
        branches: [ master ]
    pull_request:
        types: [ opened, synchronize, reopened, ready_for_review ]
    workflow_dispatch:

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
    group: tests-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:

    # ==========================================================================
    # JOB: TESTS
    # ==========================================================================
    # Typecheck, unit tests at 100% coverage across the Node matrix, the build,
    # and the Playwright e2e suite - all from the shared reusable workflow.
    tests:
        uses: sinemacula/.github/.github/workflows/node-tests.yml@v1.6.0
        permissions:
            contents: read
            id-token: write
