# Continuous-integration test workflow.
#
# Runs the type checker and the unit-test suite (with coverage) on every pull
# request and every push to master. Coverage is published to Qlty Cloud from
# master pushes only, via OIDC - no long-lived token is stored in the repo.

name: Tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    # The Qlty Cloud coverage publish authenticates via OIDC, which GitHub
    # only exposes to jobs granted id-token: write.
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        node:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Publish coverage to Qlty Cloud
        if: github.event_name == 'push' && matrix.node == 22
        uses: qltysh/qlty-action/coverage@v2
        with:
          oidc: true
          files: coverage/lcov.info

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: build/playwright-report/
          retention-days: 14
